<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renew or Order Scanner | RTN LAI 5</title>
    <link rel="stylesheet" href="./css/global.css">
    <script src="./js/theme.js"></script>
    <style>
         body { font-family: 'Inter', sans-serif; background: #0d0d14; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
         .container { max-width: 600px; width: 100%; padding: 2.5rem; background: #111827; border-radius: 16px; border: 1px solid rgba(139,92,246,0.2); box-shadow: 0 10px 40px rgba(139,92,246,0.15); }
         .tabs { display: flex; gap: 1rem; border-bottom: 2px solid rgba(255,255,255,0.05); margin-bottom: 2rem; }
         .tab-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1rem; font-weight: 600; padding: 0.75rem 1rem; cursor: pointer; transition: all 0.2s; position: relative; }
         .tab-btn.active { color: #8B5CF6; }
         .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: #8B5CF6; }
         .tab-content { display: none; }
         .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
         @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
         .field { margin-bottom: 1.25rem; }
         .field label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: #9CA3AF; }
         .field-input { width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; transition: all 0.2s; }
         .field-input:focus { border-color: #8B5CF6; background: rgba(139,92,246,0.03); }
         .btn-primary { width: 100%; padding: 0.95rem; background: linear-gradient(135deg, #7C3AED, #8B5CF6); border: none; border-radius: 12px; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.25s; box-shadow: 0 4px 20px rgba(139,92,246,0.3); }
         .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139,92,246,0.4); }
         .btn-primary:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="login.html" style="text-decoration:none; display:inline-flex; align-items:center; gap:0.5rem; color:#A78BFA; font-weight:600; font-size:0.9rem;">← Back to Sign In</a>
            <h1 style="font-size: 1.75rem; font-weight:800; margin-top: 1rem; color:#fff;">Subscription Services</h1>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('renewal')">Renew Account</button>
            <button class="tab-btn" onclick="switchTab('scanner')">Order Scanner Only</button>
        </div>
        
        <!-- Tab: Renewal -->
        <div id="tab-renewal" class="tab-content active">
            <form id="renewal-form">
                <div class="field">
                    <label>Username or Email</label>
                    <input type="text" id="renew-id" class="field-input" placeholder="Enter credentials" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="renew-password" class="field-input" placeholder="••••••••" required>
                </div>
                <div class="field">
                    <label>Product Suite</label>
                    <select id="renew-product" class="field-input">
                        <option>LAI V</option>
                        <option>RTN Display</option>
                        <option>LAI Pro (LAI V + RTN Display)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Extension Plan</label>
                    <select id="renew-plan" class="field-input">
                        <option>Monthly</option>
                        <option>1 Year</option>
                        <option>2 Years</option>
                        <option>3 Years</option>
                    </select>
                </div>
                
                <h3 style="margin: 2rem 0 1rem; color: #fff; font-size:1.1rem; opacity:0.9;">Payment Method</h3>
                <div class="field">
                    <label>Card Number</label>
                    <input type="text" id="renew-card" class="field-input" placeholder="4242 4242 4242 4242" required>
                </div>
                
                <button type="submit" class="btn-primary" id="renew-submit">Process Renewal</button>
                <div id="renew-status" style="margin-top:1.25rem; font-weight:600; font-size:0.9rem;"></div>
            </form>
        </div>
        
        <!-- Tab: Buy Scanner Only -->
        <div id="tab-scanner" class="tab-content">
            <form id="scanner-form">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="scan-name" class="field-input" placeholder="Enter your full name" required>
                </div>
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" id="scan-email" class="field-input" placeholder="billing@store.com" required>
                </div>
                <div class="field">
                    <label>Full Shipping Address</label>
                    <input type="text" id="scan-address" class="field-input" placeholder="Street, City, State, ZIP" required>
                </div>
                <div class="field">
                    <label>Hardware Selection</label>
                    <select id="scan-type" class="field-input">
                        <option value="WiFi-Scanner">WiFi Scanner ($79.78)</option>
                        <option value="Display-Scanner">Display Scanner ($79.78)</option>
                        <option value="WiFi & Display Scanner">WiFi & Display Scanner ($159.56)</option>
                    </select>
                </div>
                
                <h3 style="margin: 2rem 0 1rem; color: #fff; font-size:1.1rem; opacity:0.9;">Payment Method</h3>
                <div class="field">
                    <label>Card Number</label>
                    <input type="text" id="scan-card" class="field-input" placeholder="4242 4242 4242 4242" required>
                </div>
                
                <button type="submit" class="btn-primary" id="scanner-submit">Order Scanner</button>
                <div id="scan-status" style="margin-top:1.25rem; font-weight:600; font-size:0.9rem;"></div>
            </form>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:3001';

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if(tab === 'renewal') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('tab-renewal').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('tab-scanner').classList.add('active');
            }
        }
        
        document.getElementById('renewal-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('renew-submit');
            const status = document.getElementById('renew-status');
            btn.disabled = true; btn.textContent = 'Securing Payment...';
            
            const data = {
                username: document.getElementById('renew-id').value,
                password: document.getElementById('renew-password').value,
                product: document.getElementById('renew-product').value,
                plan: document.getElementById('renew-plan').value,
                card_no: document.getElementById('renew-card').value
            };
            
            try {
                const resp = await fetch(`${API_BASE}/api/renew-plan`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const resJson = await resp.json();
                if(resp.ok && resJson.success) {
                    status.style.color = '#10B981';
                    status.innerHTML = `✅ ${resJson.message}`;
                    setTimeout(() => window.location.href = 'login.html', 2200);
                } else {
                    status.style.color = '#EF4444';
                    status.innerHTML = `❌ ${resJson.error || 'Authorization failed'}`;
                    btn.disabled = false; btn.textContent = 'Process Renewal';
                }
            } catch(e) {
                status.style.color = '#EF4444';
                status.innerHTML = `❌ Server offline.`;
                btn.disabled = false; btn.textContent = 'Process Renewal';
            }
        });

        document.getElementById('scanner-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('scanner-submit');
            const status = document.getElementById('scan-status');
            btn.disabled = true; btn.textContent = 'Routing Order...';
            
            const data = {
                name: document.getElementById('scan-name').value,
                email: document.getElementById('scan-email').value,
                address: document.getElementById('scan-address').value,
                scanner_type: document.getElementById('scan-type').value,
                card_no: document.getElementById('scan-card').value
            };
            
            try {
                const resp = await fetch(`${API_BASE}/api/buy-scanner`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const resJson = await resp.json();
                if(resp.ok && resJson.success) {
                    status.style.color = '#10B981';
                    status.innerHTML = `✅ ${resJson.message}`;
                    setTimeout(() => window.location.href = 'login.html', 2200);
                } else {
                    status.style.color = '#EF4444';
                    status.innerHTML = `❌ ${resJson.error || 'Order failed'}`;
                    btn.disabled = false; btn.textContent = 'Order Scanner';
                }
            } catch(e) {
                status.style.color = '#EF4444';
                status.innerHTML = `❌ Server offline.`;
                btn.disabled = false; btn.textContent = 'Order Scanner';
            }
        });
    </script>
</body>
</html>
