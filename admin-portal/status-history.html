<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status History Audit | RTN LAI 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --primary: #8b5cf6;
            --text-main: #f1f5f9;
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--panel-bg);
            border-radius: 12px;
            overflow: hidden;
        }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(255,255,255,0.05); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .activated { background: rgba(16, 185, 129, 0.1); color: #10B981; }
        .inactivated { background: rgba(239, 68, 68, 0.1); color: #EF4444; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Status Change History Audit</h1>
            <div id="customer-name" style="font-weight:600; opacity:0.7;"></div>
        </header>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Status</th>
                    <th>Reason</th>
                    <th>Changed By</th>
                    <th>Date & Time</th>
                </tr>
            </thead>
            <tbody id="logs-list"></tbody>
        </table>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? (window.location.port === '3001' ? '' : 'http://localhost:3001')
            : '';
        const urlParams = new URLSearchParams(window.location.search);
        const regId = urlParams.get('regId');

        async function fetchLogs() {
            if (!regId) return;
            try {
                const resp = await fetch(`${API_BASE}/api/admin/registrations/${regId}/status-logs`, { credentials: 'include' });
                const data = await resp.json();
                if (data.success) {
                    const tbody = document.getElementById('logs-list');
                    tbody.innerHTML = data.logs.map(l => `
                        <tr>
                            <td><span class="badge ${l.status === 'Activated' ? 'activated' : 'inactivated'}">${l.status.toUpperCase()}</span></td>
                            <td style="font-style:italic;">"${l.reason}"</td>
                            <td>${l.changed_by_name}</td>
                            <td>${new Date(l.created_at.replace(' ', 'T')).toLocaleString()}</td>
                        </tr>
                    `).join('') || '<tr><td colspan="4" style="text-align:center; padding:2rem; opacity:0.5;">No history found.</td></tr>';
                }
            } catch (err) {
                console.error(err);
            }
        }
        fetchLogs();
    </script>
</body>
</html>
